[mod-setting-description]
Redrawn-Space-Connections-route-length-multiplier=Ta wartość jest stosowana przed zaokrągleniem długości trasy do najbliższych 1000 km. Nie dotyczy to tras, których długość została zdefiniowana przez inny mod.
